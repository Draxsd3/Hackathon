services:
  - type: web
    name: edulib-id-backend
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_PROVIDER
        value: supabase-rest
      - key: CORS_ORIGIN
        value: http://localhost:5173,http://localhost:5174,https://*.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
